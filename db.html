<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danh Bạ Liên Thông Hải Quan</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter (Tối ưu hiển thị bảng số liệu và danh bạ cực sắc nét) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        cpn: { 500: '#10b981', 600: '#059669', 700: '#047857' }, // Chuyển phát nhanh (Emerald)
                        csg: { 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, // Cảng Sài Gòn (Sky)
                        dtq: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }  // Đội thông quan (Indigo)
                    }
                }
            }
        }
    </script>
    
    <style>
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        .theme-transition {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        button, a {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen theme-transition antialiased">

    <div class="max-w-3xl mx-auto px-4 py-3 lg:py-6 space-y-3.5">
        
        <!-- TOP NAVIGATION BAR (Slim and clearly legible) -->
        <header class="flex justify-between items-center bg-white dark:bg-slate-800 px-4 py-2.5 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800/80 theme-transition">
            <div class="flex items-center gap-3">
                <span id="unitIndicatorDot" class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
                <div>
                    <h1 class="text-xs lg:text-sm font-black text-slate-900 dark:text-white uppercase tracking-wider leading-none">DANH BẠ LIÊN THÔNG</h1>
                    <p id="miniUnitSub" class="text-[9.5px] lg:text-[10px] text-slate-400 dark:text-slate-500 font-extrabold uppercase mt-1">CHUYỂN PHÁT NHANH</p>
                </div>
            </div>
            
            <div class="flex items-center gap-1.5">
                <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 rounded-lg transition" title="Đổi giao diện Sáng/Tối">
                    <i data-lucide="sun" id="sunIcon" class="w-4 h-4 hidden"></i>
                    <i data-lucide="moon" id="moonIcon" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <!-- UNIT SEGMENTED SWITCH (Larger, more touch-friendly segments) -->
        <nav class="bg-slate-200/50 dark:bg-slate-950/40 p-1.5 rounded-xl flex items-center justify-between gap-1 w-full text-center">
            <button onclick="setActiveUnit('CPN')" id="tab_CPN" class="flex-1 py-2 text-center rounded-lg text-xs lg:text-sm font-black transition-all duration-150 bg-white dark:bg-slate-800 shadow-sm text-emerald-600 dark:text-white border border-slate-200/20">
                HQ C.P.NHANH
            </button>
            <button onclick="setActiveUnit('CSG')" id="tab_CSG" class="flex-1 py-2 text-center rounded-lg text-xs lg:text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-150">
                CẢNG SÀI GÒN I
            </button>
            <button onclick="setActiveUnit('DTQ')" id="tab_DTQ" class="flex-1 py-2 text-center rounded-lg text-xs lg:text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-all duration-150">
                ĐỘI THÔNG QUAN
            </button>
        </nav>

        <!-- SEARCH AND QUICK FILTER CONTROLS -->
        <section class="bg-white dark:bg-slate-800 p-3 lg:p-4 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800/80 space-y-2.5">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400 dark:text-slate-500">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </span>
                <input type="text" id="searchInput" oninput="handleSearchFilter()" placeholder="Tìm tên, số điện thoại, số bàn..." class="w-full pl-9 pr-4 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-emerald-500 transition text-slate-800 dark:text-slate-100 placeholder-slate-400">
            </div>

            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 pt-2 border-t border-slate-100/60 dark:border-slate-700/50">
                <div class="w-full sm:w-auto">
                    <!-- Responsive wrapped pills container to never break the UI layout -->
                    <div id="subGroupPills" class="flex flex-wrap gap-1.5 py-0.5 justify-start sm:justify-center">
                        <!-- Loaded dynamically via JS -->
                    </div>
                </div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 flex items-center gap-1.5 bg-slate-50 dark:bg-slate-900 px-2 py-1 rounded self-end sm:self-auto whitespace-nowrap">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500" id="statDot"></span>
                    <span id="miniStatsText">0 CB</span>
                </div>
            </div>
        </section>

        <!-- MAIN VIEWPORT CONTAINER -->
        <main class="relative">
            <!-- No Results Alert -->
            <div id="noDataAlert" class="hidden text-center py-10 bg-white dark:bg-slate-800 rounded-xl border border-slate-100 dark:border-slate-800/80 shadow-sm">
                <div class="w-10 h-10 bg-slate-50 dark:bg-slate-900 text-slate-400 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i data-lucide="user-x" class="w-5 h-5"></i>
                </div>
                <h3 class="text-xs lg:text-sm font-bold text-slate-800 dark:text-slate-200">Không tìm thấy cán bộ</h3>
                <p class="text-[10px] lg:text-xs text-slate-400 mt-1">Vui lòng kiểm tra lại từ khóa hoặc bộ phận</p>
            </div>

            <div id="contactsContainer" class="hidden space-y-1.5">
                <!-- MOBILE MINIMALIST CONTACT LIST (Strictly active on screens < lg) -->
                <div id="mobileListLayout" class="block lg:hidden space-y-1.5">
                    <!-- Injected via JavaScript -->
                </div>

                <!-- DESKTOP TABLE LAYOUT (Strictly active on screens >= lg to prevent broken vertical column wrap) -->
                <div id="desktopTableLayout" class="hidden lg:block bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800/80 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse table-auto">
                            <thead>
                                <tr class="bg-slate-50/70 dark:bg-slate-900/40 border-b border-slate-100 dark:border-slate-700/50 text-[11px] font-bold text-slate-400 dark:text-slate-450 uppercase tracking-wider whitespace-nowrap">
                                    <th class="py-2.5 px-4 text-center w-24">Bàn/Ghi sê</th>
                                    <th class="py-2.5 px-4">Họ và Tên</th>
                                    <th class="py-2.5 px-4 w-48">Số điện thoại</th>
                                    <th class="py-2.5 px-4 text-right pr-6 w-28">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-100/50 dark:divide-slate-700/30">
                                <!-- Injected dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="flex justify-between items-center px-1 text-[10px] font-semibold text-slate-400 dark:text-slate-500">
            <div>Dữ liệu: Hải quan CPN - CSG I - Đội Thông Quan</div>
            <div class="flex items-center gap-2">
                <span>Cập nhật: 2026</span>
            </div>
        </footer>
    </div>

        // --- STREAMING_CHUNK: Processing shortened string titles... ---
        function getShortSubGroupName(name) {
            let short = name.normalize('NFC');
            // Convert "TỔ NGHIỆP VỤ 1" to "Tổ 1"
            short = short.replace(/TỔ NGHIỆP VỤ/gi, 'Tổ');
            // Convert "NHÓM 1" to "Nhóm 1"
            short = short.replace(/NHÓM/gi, 'Nhóm');
            // Strip out "Chương"
            short = short.replace(/Chương/gi, '');
            // Clean spaces inside parentheses
            short = short.replace(/\(\s*(\d+)\s*-\s*(\d+)\s*\)/g, '($1-$2)');
            // For CPN, show "Đăng Ký" or "Kiểm Hóa" instead of "Nhóm Đăng Ký..."
            short = short.replace(/Nhóm ĐĂNG KÝ/gi, 'Đăng Ký');
            short = short.replace(/Nhóm KIỂM HÓA/gi, 'Kiểm Hóa');
            return short.trim();
        }

        // --- STREAMING_CHUNK: Generating dynamic touch pills filters... ---
        function renderSubGroupPills() {
            const container = document.getElementById('subGroupPills');
            container.innerHTML = '';

            const subGroups = SUBGROUP_METADATA[activeUnit];
            const tokens = UNIT_THEME_TOKENS[activeUnit];

            // Render ALL Pill
            const allBtn = document.createElement('button');
            allBtn.onclick = () => filterSubGroup("ALL");
            if (activeSubGroup === 'ALL') {
                allBtn.className = `px-3 py-1 rounded-full text-xs font-black transition text-white ${tokens.bgActive}`;
            } else {
                allBtn.className = "px-3 py-1 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition";
            }
            allBtn.innerText = "Tất cả";
            container.appendChild(allBtn);

            // Render Subgroup Pills
            subGroups.forEach(grp => {
                const btn = document.createElement('button');
                btn.onclick = () => filterSubGroup(grp);
                
                // Show clean and shortened text to prevent vertical layout destruction on split screen
                btn.innerText = getShortSubGroupName(grp);
                btn.title = grp; // Full group name on hover

                if (activeSubGroup === grp) {
                    btn.className = `px-3 py-1 rounded-full text-xs font-black transition text-white ${tokens.bgActive}`;
                } else {
                    btn.className = "px-3 py-1 rounded-full text-xs font-bold bg-slate-100 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition";
                }
                container.appendChild(btn);
            });
        }

        function filterSubGroup(grp) {
            activeSubGroup = grp;

        function handleSearchFilter() {
            searchQuery = document.getElementById('searchInput').value.trim().toLowerCase();

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            
            if (isDark) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');

                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        // --- STREAMING_CHUNK: Filtering, grouping, and enforcing correct sorting... ---
        function renderApp() {
            let filtered = contacts.filter(contact => {
                const matchesUnit = contact.unit === activeUnit;
                const matchesSubGroup = activeSubGroup === 'ALL' || contact.subGroup.normalize('NFC') === activeSubGroup.normalize('NFC');
                const matchesSearch = !searchQuery || 
                    contact.name.toLowerCase().includes(searchQuery) ||
                    contact.phone.replace(/[.\s]/g, "").includes(searchQuery.replace(/[.\s]/g, "")) ||
                    contact.desk.toLowerCase().includes(searchQuery);

                return matchesUnit && matchesSubGroup && matchesSearch;
            });

            // Strict sorting sequence (Preserve exact original STT order defined in ID)
            const subGroupOrder = (SUBGROUP_METADATA[activeUnit] || []).map(g => g.normalize('NFC'));
            filtered.sort((a, b) => {
                const indexA = subGroupOrder.indexOf(a.subGroup.normalize('NFC'));
                const indexB = subGroupOrder.indexOf(b.subGroup.normalize('NFC'));
                if (indexA !== indexB) return indexA - indexB;

                // Sort by internal ID to perfectly match original image/document order (STT)
                return a.id - b.id;
            });

            document.getElementById('miniStatsText').innerText = `${filtered.length} CB`;

            const noDataAlert = document.getElementById('noDataAlert');
            const contactsContainer = document.getElementById('contactsContainer');

            if (filtered.length === 0) {
                noDataAlert.classList.remove('hidden');
                contactsContainer.classList.add('hidden');
                return;
            }

            noDataAlert.classList.add('hidden');
            contactsContainer.classList.remove('hidden');
            
            renderMobileList(filtered);
            renderDesktopTable(filtered);

            lucide.createIcons();
        }

                            <i data-lucide="phone" class="w-5 h-5"></i>
                        </a>
                        <a href="sms:${item.phone.replace(/[.\s]/g, "")}" class="w-[38px] h-[38px] bg-sky-500 hover:bg-sky-600 text-white rounded-lg flex items-center justify-center shadow-sm active:scale-90 transition" title="Nhắn tin">
                            <i data-lucide="message-square" class="w-5 h-5"></i>
                        </a>
                        
                        <!-- Actions Dropdown -->
                        <div class="relative inline-block text-left">
                            <button onclick="toggleMobileMenu(event, ${item.id})" class="w-8 h-[38px] text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded flex items-center justify-center transition">
                                <i data-lucide="more-vertical" class="w-4 h-4"></i>
                            </button>
                            <div id="mobileDrop_${item.id}" class="hidden absolute right-0 mt-1 w-36 bg-white dark:bg-slate-700 rounded-lg shadow-xl border border-slate-150 dark:border-slate-600 py-1 z-20 text-[11px] font-bold">
                                <button onclick="copyToClipboard('${item.phone}', '${item.name}')" class="w-full text-left px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-600 flex items-center gap-1.5">
                                    <i data-lucide="copy" class="w-3.5 h-3.5 text-slate-500"></i> Sao chép SĐT
                                </button>
                                <button onclick="downloadVCard('${item.name}', '${item.phone}', '${item.subGroup}')" class="w-full text-left px-3 py-2 hover:bg-slate-50 dark:hover:bg-slate-600 flex items-center gap-1.5">
                                    <i data-lucide="download" class="w-3.5 h-3.5 text-indigo-500"></i> Lưu danh bạ
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function toggleMobileMenu(event, id) {
            event.stopPropagation();
            const menu = document.getElementById(`mobileDrop_${id}`);
            const allMenus = document.querySelectorAll('[id^="mobileDrop_"]');
            
            allMenus.forEach(m => {
                if (m.id !== `mobileDrop_${id}`) m.classList.add('hidden');
            });
            
            menu.classList.toggle('hidden');
            
            const closeHandler = () => {
                menu.classList.add('hidden');
                document.removeEventListener('click', closeHandler);
            };
            document.addEventListener('click', closeHandler);
        }

        // --- STREAMING_CHUNK: Formatting clean desktop table layouts with inline leadership tags... ---
        function renderDesktopTable(list) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            let currentSubGroupHeader = "";

            list.forEach(item => {
                if (item.subGroup !== currentSubGroupHeader) {
                    currentSubGroupHeader = item.subGroup;
                    const sepRow = document.createElement('tr');
                    sepRow.className = "bg-slate-100/40 dark:bg-slate-900/20 font-black text-slate-500 dark:text-slate-400 text-xs border-y border-slate-200/50 dark:border-slate-800/80";
                    sepRow.innerHTML = `
                        <td colspan="4" class="py-2.5 px-4 uppercase tracking-wider text-center">
                            ${currentSubGroupHeader}
                        </td>
                    `;
                    tbody.appendChild(sepRow);
                }

                // Construct Name HTML including potential leader badge next to name
                let nameHtml = item.name;
                if (item.isLeader) {
                    nameHtml += ` <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-black bg-amber-100 dark:bg-amber-950/60 text-amber-800 dark:text-amber-400 border border-amber-200/20 ml-1.5 uppercase tracking-wider">${item.leaderTitle}</span>`;
                }

                const row = document.createElement('tr');
                row.className = "border-b border-slate-100/50 dark:border-slate-800/30 hover:bg-slate-50/50 dark:hover:bg-slate-800/20 text-sm transition";
                
                row.innerHTML = `
                    <!-- Desk Number -->
                    <td class="py-2.5 px-4 text-center">
                        <span class="inline-block px-2.5 py-0.5 font-extrabold rounded bg-slate-100 dark:bg-slate-900 text-slate-700 dark:text-slate-400 text-xs whitespace-nowrap">
                            ${item.desk}
                        </span>
                    </td>
                    
                    <!-- Full Name & Leadership Badge -->
                    <td class="py-2.5 px-4 font-bold text-slate-900 dark:text-white whitespace-nowrap flex items-center">
                        ${nameHtml}
                    </td>
                    
                    <!-- Telephone link -->
                    <td class="py-2.5 px-4 font-black text-emerald-600 dark:text-emerald-400 whitespace-nowrap">
                        <a href="tel:${item.phone.replace(/[.\s]/g, "")}" class="hover:underline flex items-center gap-1.5">
                            <i data-lucide="phone" class="w-3.5 h-3.5 text-emerald-500"></i> ${item.phone}
                        </a>
                    </td>
                    
                    <!-- Actions -->
                    <td class="py-2.5 px-4 text-right pr-6 whitespace-nowrap">
                        <div class="flex items-center justify-end gap-2">
                            <a href="tel:${item.phone.replace(/[.\s]/g, "")}" class="p-1.5 text-emerald-600 hover:bg-emerald-50 dark:hover:bg-emerald-950/20 rounded-md transition" title="Gọi điện">
                                <i data-lucide="phone" class="w-4 h-4"></i>
                            </a>
                            <a href="sms:${item.phone.replace(/[.\s]/g, "")}" class="p-1.5 text-sky-600 hover:bg-sky-50 dark:hover:bg-sky-950/20 rounded-md transition" title="Nhắn tin">
                                <i data-lucide="message-square" class="w-4 h-4"></i>
                            </a>
                            <button onclick="copyToClipboard('${item.phone}', '${item.name}')" class="p-1.5 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-md transition" title="Sao chép số">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                            <button onclick="downloadVCard('${item.name}', '${item.phone}', '${item.subGroup}')" class="p-1.5 text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-950/20 rounded-md transition" title="Lưu danh bạ (VCard)">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // --- STREAMING_CHUNK: Processing feedback notifications... ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let icon = 'info';
            let bgClass = 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700';
            let textClass = 'text-slate-850 dark:text-slate-100';
            
            if (type === 'success') {
                icon = 'check-circle';
                bgClass = 'bg-emerald-50 dark:bg-emerald-950/90 border-emerald-200 dark:border-emerald-800/50';
                textClass = 'text-emerald-800 dark:text-emerald-250';
            } else if (type === 'error') {
                icon = 'alert-triangle';
                bgClass = 'bg-rose-50 dark:bg-rose-950/90 border-rose-200 dark:border-rose-800/50';
                textClass = 'text-rose-800 dark:text-rose-250';
            }

            toast.className = `flex items-center gap-2 px-3 py-2 rounded-lg border ${bgClass} shadow-md transition duration-200 opacity-0 transform translate-y-1 pointer-events-auto max-w-xs text-xs font-bold`;
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-4 h-4 flex-shrink-0"></i>
                <span class="${textClass}">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => toast.classList.remove('opacity-0', 'translate-y-1'), 10);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => toast.remove(), 200);
            }, 2000);
        }

        function copyToClipboard(text, displayName) {
            const tempInput = document.createElement("input");
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                const successful = document.execCommand("copy");
                if (successful) {
                    showToast(`Đã sao chép SĐT của Đ/c ${displayName}`);
                } else {
                    showToast("Không thể sao chép!", "error");
                }
            } catch (err) {
                showToast("Lỗi clipboard", "error");
            }
            document.body.removeChild(tempInput);
        }

        // --- STREAMING_CHUNK: Processing vCard download generation... ---
        function downloadVCard(name, phone, group) {
            const vcard = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                `FN:${name}`,
                `N:;${name};;;`,
                `TEL;TYPE=CELL:${phone.replace(/[.\s]/g, "")}`,
                `ORG:Hải Quan Việt Nam - ${group}`,
                "END:VCARD"
            ].join("\n");

            const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `${name.replace(/\s+/g, '_')}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast(`Đã tạo tệp liên hệ Đ/c ${name}`);
        }
    </script>
</body>
</html>
